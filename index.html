    padding: 15px 30px;

    border: none;

}

<body>

<h1>⏳ Почекай 10 секунд...</h1>
<p id="timer">10</p>

<button id="btn" style="display:none;" onclick="getScript()">Отримати скрипт</button>

<script>
let time = 10;
let timer = document.getElementById("timer");

let interval = setInterval(() => {
    time--;
    timer.innerText = time;

    if (time <= 0) {
        clearInterval(interval);
        document.getElementById("btn").style.display = "inline-block";
    }
}, 1000);

function getScript() {
    window.location.href = "https://YOUR_SCRIPT_LINK_HERE";
}
</script>
