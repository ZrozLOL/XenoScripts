<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: linear-gradient(135deg, #1a1a1a 0%, #000000 100%);
    color: white;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}
.container {
    text-align: center;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(10px);
    padding: 60px 40px;
    border-radius: 30px;
    box-shadow: 0 20px 60px rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.1);
    max-width: 500px;
    width: 90%;
    animation: fadeIn 0.6s ease-out;
}
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
}
h1 { font-size: 32px; margin-bottom: 30px; font-weight: 600; letter-spacing: -0.5px; }
.timer-container { margin: 40px 0; }
#timer {
    font-size: 80px;
    font-weight: bold;
    background: linear-gradient(135deg, #ffffff 0%, #cccccc 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: pulse 1s ease-in-out infinite;
}
@keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
}
.progress-bar {
    width: 100%; height: 8px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 10px; overflow: hidden; margin-top: 30px;
}
.progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #ffffff 0%, #888888 100%);
    width: 100%;
    animation: progressAnimation 15s linear forwards;
    border-radius: 10px;
}
@keyframes progressAnimation {
    from { width: 100%; }
    to { width: 0%; }
}
button {
    padding: 18px 45px; font-size: 20px;
    background: linear-gradient(135deg, #ffffff 0%, #cccccc 100%);
    border: none; color: #000000; cursor: pointer;
    border-radius: 50px; font-weight: 600;
    box-shadow: 0 10px 30px rgba(255, 255, 255, 0.2);
    transition: all 0.3s ease; display: none;
    margin-top: 20px; letter-spacing: 0.5px;
}
button:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(255, 255, 255, 0.4); }
button:active { transform: translateY(-1px); }
button.show { display: inline-block; animation: bounceIn 0.6s ease-out; }
@keyframes bounceIn {
    0% { opacity: 0; transform: scale(0.3); }
    50% { transform: scale(1.05); }
    100% { opacity: 1; transform: scale(1); }
}
.subtitle { margin-top: 20px; font-size: 16px; opacity: 0.9; color: #cccccc; }
.particle { position: absolute; background: rgba(255,255,255,0.8); border-radius: 50%; pointer-events: none; }
@media (max-width: 600px) {
    .container { padding: 40px 30px; }
    h1 { font-size: 24px; }
    #timer { font-size: 60px; }
    button { padding: 15px 35px; font-size: 18px; }
}
</style>
</head>
<body>
<a href="home.html" style="
    position: fixed; top: 20px; right: 20px; z-index: 999;
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 20px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    color: #f0f0f0;
    font-family: 'Segoe UI', sans-serif;
    font-size: 13px; font-weight: 600;
    text-decoration: none;
    border-radius: 8px;
    backdrop-filter: blur(10px);
    transition: all 0.2s ease;
" onmouseover="this.style.background='rgba(255,255,255,0.12)'" onmouseout="this.style.background='rgba(255,255,255,0.06)'">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
    Home
</a>
<div class="container">
    <h1>⏳ Please Wait...</h1>
    <div class="timer-container">
        <p id="timer">15</p>
    </div>
    <div class="progress-bar">
        <div class="progress-fill"></div>
    </div>
    <p class="subtitle">Your script is being prepared</p>
    <button id="btn" onclick="getScript()">Get Script Now</button>
</div>

<script>
function createParticles() {
    for (let i = 0; i < 60; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        const size = Math.random() * 6 + 3;
        particle.style.width = size + 'px';
        particle.style.height = size + 'px';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = '100%';
        const duration = Math.random() * 8 + 6;
        const delay = Math.random() * 10;
        const drift = Math.random() * 200 - 100;
        particle.style.animation = `float-${i} ${duration}s linear ${delay}s infinite`;
        
        const keyframes = `
            @keyframes float-${i} {
                0% { transform: translateY(0) translateX(0); opacity: 0; }
                10% { opacity: 0.8; }
                90% { opacity: 0.8; }
                100% { transform: translateY(-120vh) translateX(${drift}px); opacity: 0; }
            }
        `;
        const style = document.createElement('style');
        style.textContent = keyframes;
        document.head.appendChild(style);
        
        document.body.appendChild(particle);
    }
}

createParticles();

let time = 15;
let timer = document.getElementById("timer");
let btn = document.getElementById("btn");

let interval = setInterval(() => {
    time--;
    timer.innerText = time;
    if (time <= 0) {
        clearInterval(interval);
        timer.innerText = "✓";
        btn.classList.add('show');
        document.querySelector('.subtitle').innerText = "Ready to download!";
    }
}, 1000);

function getScript() {
    const urlParams = new URLSearchParams(window.location.search);
    const scriptId = urlParams.get('id');
    if (scriptId) {
        sessionStorage.setItem('ad_passed_' + scriptId, 'true');
        window.location.href = `script.html?id=${scriptId}`;
    } else {
        alert('Error: No script ID provided');
    }
}
</script>
