<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

.container {
    text-align: center;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    padding: 60px 40px;
    border-radius: 30px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(255, 255, 255, 0.2);
    max-width: 500px;
    width: 90%;
    animation: fadeIn 0.6s ease-out;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(-30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

h1 {
    font-size: 32px;
    margin-bottom: 30px;
    font-weight: 600;
    letter-spacing: -0.5px;
}

.timer-container {
    margin: 40px 0;
}

#timer {
    font-size: 80px;
    font-weight: bold;
    background: linear-gradient(135deg, #ffd89b 0%, #19547b 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: 0 4px 20px rgba(255, 255, 255, 0.3);
    animation: pulse 1s ease-in-out infinite;
}

@keyframes pulse {
    0%, 100% {
        transform: scale(1);
    }
    50% {
        transform: scale(1.1);
    }
}

.progress-bar {
    width: 100%;
    height: 8px;
    background: rgba(255, 255, 255, 0.2);
    border-radius: 10px;
    overflow: hidden;
    margin-top: 30px;
}

.progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #00d2ff 0%, #3a47d5 100%);
    width: 100%;
    animation: progressAnimation 15s linear forwards;
    border-radius: 10px;
}

@keyframes progressAnimation {
    from {
        width: 100%;
    }
    to {
        width: 0%;
    }
}

button {
    padding: 18px 45px;
    font-size: 20px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 50px;
    font-weight: 600;
    box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    transition: all 0.3s ease;
    display: none;
    margin-top: 20px;
    letter-spacing: 0.5px;
}

button:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
}

button:active {
    transform: translateY(-1px);
}

button.show {
    display: inline-block;
    animation: bounceIn 0.6s ease-out;
}

@keyframes bounceIn {
    0% {
        opacity: 0;
        transform: scale(0.3);
    }
    50% {
        transform: scale(1.05);
    }
    100% {
        opacity: 1;
        transform: scale(1);
    }
}

.subtitle {
    margin-top: 20px;
    font-size: 16px;
    opacity: 0.9;
    color: #e0e0e0;
}

.particle {
    position: absolute;
    background: rgba(255, 255, 255, 0.5);
    border-radius: 50%;
    pointer-events: none;
}

@media (max-width: 600px) {
    .container {
        padding: 40px 30px;
    }
    
    h1 {
        font-size: 24px;
    }
    
    #timer {
        font-size: 60px;
    }
    
    button {
        padding: 15px 35px;
        font-size: 18px;
    }
}
</style>
</head>
<body>

<div class="container">
    <h1>⏳ Please Wait...</h1>
    <div class="timer-container">
        <p id="timer">15</p>
    </div>
    <div class="progress-bar">
        <div class="progress-fill"></div>
    </div>
    <p class="subtitle">Your script is being prepared</p>
    <button id="btn" onclick="getScript()">Get Script Now</button>
</div>

<script>
// Create animated particles
function createParticles() {
    for (let i = 0; i < 30; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.width = Math.random() * 5 + 2 + 'px';
        particle.style.height = particle.style.width;
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = Math.random() * 100 + '%';
        particle.style.animation = `float ${Math.random() * 10 + 5}s linear infinite`;
        document.body.appendChild(particle);
    }
}

const style = document.createElement('style');
style.textContent = `
    @keyframes float {
        0%, 100% {
            transform: translateY(0) translateX(0);
            opacity: 0;
        }
        50% {
            opacity: 0.5;
        }
        100% {
            transform: translateY(-100vh) translateX(${Math.random() * 200 - 100}px);
        }
    }
`;
document.head.appendChild(style);
createParticles();

// Timer logic - 15 seconds
let time = 15;
let timer = document.getElementById("timer");
let btn = document.getElementById("btn");

let interval = setInterval(() => {
    time--;
    timer.innerText = time;
    
    if (time <= 0) {
        clearInterval(interval);
        timer.innerText = "✓";
        btn.classList.add('show');
        document.querySelector('.subtitle').innerText = "Ready to download!";
    }
}, 1000);

function getScript() {
    const urlParams = new URLSearchParams(window.location.search);
    const scriptId = urlParams.get('id');
    
    if (scriptId) {
        // Зберігаємо токен що юзер пройшов таймер
        sessionStorage.setItem('ad_passed_' + scriptId, 'true');
        window.location.href = `script.html?id=${scriptId}`;
    } else {
        alert('Error: No script ID provided');
    }
}
</script>
<script>
// Багаторівнева детекція AdBlock
(function() {
    var adBlockDetected = false;
    
    // Метод 1: Множинні приманки
    var baits = [];
    var baitClasses = ['ad', 'ads', 'adsbox', 'adsbygoogle', 'ad-placement', 'doubleclick', 'ad-banner'];
    
    baitClasses.forEach(function(className) {
        var bait = document.createElement('div');
        bait.className = className;
        bait.style.cssText = 'height:1px!important;width:1px!important;position:absolute!important;left:-999px!important;';
        bait.innerHTML = '&nbsp;';
        document.body.appendChild(bait);
        baits.push(bait);
    });
    
    function showAdBlockWarning() {
        document.body.innerHTML = `
            <div style="
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                font-family: 'Segoe UI', sans-serif;
                text-align: center;
                padding: 20px;
            ">
                <div style="font-size: 80px; margin-bottom: 20px;">🚫</div>
                <h1 style="font-size: 32px; margin-bottom: 15px;">
                    Please Disable AdBlock
                </h1>
                <p style="font-size: 16px; opacity: 0.9; margin-bottom: 30px; max-width: 400px;">
                    We detected that you're using an ad blocker. 
                    Please disable it and refresh the page to continue.
                </p>
                <button onclick="location.reload()" style="
                    padding: 18px 45px;
                    font-size: 18px;
                    background: white;
                    color: #667eea;
                    border: none;
                    border-radius: 50px;
                    cursor: pointer;
                    font-weight: 600;
                    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
                ">
                    🔄 Refresh Page
                </button>
            </div>
        `;
    }
    
    setTimeout(function() {
        var blockedCount = 0;
        
        baits.forEach(function(bait) {
            if (bait.offsetHeight === 0 || 
                bait.offsetWidth === 0 || 
                window.getComputedStyle(bait).display === 'none' ||
                window.getComputedStyle(bait).visibility === 'hidden') {
                blockedCount++;
            }
            bait.remove();
        });
        
        // Якщо хоча б 2 приманки заблоковані
        if (blockedCount >= 2) {
            showAdBlockWarning();
        }
    }, 200);
    
    // Метод 2: Перевірка через fetch Google Ads
    fetch('https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js', {
        method: 'HEAD',
        mode: 'no-cors'
    }).catch(function() {
        setTimeout(showAdBlockWarning, 300);
    });
})();
</script>
</body>
