<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    overflow: hidden;
}

.script-container {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    padding: 60px 40px;
    border-radius: 30px;
    max-width: 500px;
    width: 90%;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(255, 255, 255, 0.2);
    animation: fadeIn 0.6s ease-out;
    text-align: center;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
}

h1 {
    font-size: 32px;
    margin-bottom: 15px;
    font-weight: 600;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #ffd89b 0%, #19547b 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.script-info {
    margin-bottom: 20px;
    opacity: 0.9;
}

.script-info p {
    margin: 5px 0;
    font-size: 15px;
}

.badges {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin: 10px 0;
}

.game-badge {
    display: inline-block;
    background: rgba(102, 126, 234, 0.3);
    padding: 6px 18px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
}

.keyless-badge {
    display: inline-block;
    background: rgba(0, 210, 100, 0.25);
    padding: 6px 18px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
}

.haskey-badge {
    display: inline-block;
    background: rgba(255, 100, 100, 0.25);
    padding: 6px 18px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
}
.server-badge {
    display: inline-block;
    background: rgba(255, 165, 0, 0.25);
    padding: 6px 18px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
}

.client-badge {
    display: inline-block;
    background: rgba(0, 150, 255, 0.25);
    padding: 6px 18px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
}
.both-badge {
    display: inline-block;
    background: rgba(138, 43, 226, 0.25);
    padding: 6px 18px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
}
.script-box {
    background: rgba(0, 0, 0, 0.4);
    padding: 20px;
    border-radius: 20px;
    margin: 20px 0;
    font-family: 'Courier New', monospace;
    word-wrap: break-word;
    max-height: 300px;
    overflow-y: auto;
    border: 2px solid rgba(255, 255, 255, 0.1);
    font-size: 13px;
    line-height: 1.6;
    text-align: left;
}

.script-box::-webkit-scrollbar { width: 8px; }
.script-box::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); border-radius: 10px; }
.script-box::-webkit-scrollbar-thumb { background: rgba(102,126,234,0.6); border-radius: 10px; }

.button-group {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 20px;
}

button {
    padding: 16px 35px;
    font-size: 17px;
    background: linear-gradient(135deg, #00d2ff 0%, #3a47d5 100%);
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 50px;
    font-weight: 600;
    box-shadow: 0 10px 30px rgba(0, 210, 255, 0.4);
    transition: all 0.3s ease;
    letter-spacing: 0.5px;
}

button:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(0, 210, 255, 0.6); }
button:active { transform: translateY(-1px); }

.btn-secondary {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
}

.btn-secondary:hover { box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6); }

.copied-msg {
    color: #00ff88;
    font-weight: bold;
    text-align: center;
    margin-top: 15px;
    font-size: 17px;
    display: none;
    animation: bounceIn 0.5s ease-out;
}

@keyframes bounceIn {
    0% { opacity: 0; transform: scale(0.5); }
    100% { opacity: 1; transform: scale(1); }
}

.loading { text-align: center; font-size: 20px; padding: 30px; }
.error { text-align: center; color: #ff6b6b; padding: 20px; font-size: 17px; }

.particle {
    position: absolute;
    background: rgba(255, 255, 255, 0.5);
    border-radius: 50%;
    pointer-events: none;
}

@media (max-width: 600px) {
    .script-container { padding: 40px 25px; }
    h1 { font-size: 24px; }
    button { padding: 14px 28px; font-size: 15px; width: 100%; }
    .button-group { flex-direction: column; }
}
</style>
</head>
<body>

<div class="script-container" id="container">
    <div class="loading">⏳ Loading your script...</div>
</div>

<script>
function createParticles() {
    for (let i = 0; i < 30; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.width = Math.random() * 5 + 2 + 'px';
        particle.style.height = particle.style.width;
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = Math.random() * 100 + '%';
        particle.style.animation = `float ${Math.random() * 10 + 5}s linear infinite`;
        document.body.appendChild(particle);
    }
}

const style = document.createElement('style');
style.textContent = `
    @keyframes float {
        0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
        50% { opacity: 0.5; }
        100% { transform: translateY(-100vh) translateX(${Math.random() * 200 - 100}px); }
    }
`;
document.head.appendChild(style);
createParticles();

const urlParams = new URLSearchParams(window.location.search);
const scriptId = urlParams.get('id');

if (!sessionStorage.getItem('ad_passed_' + scriptId)) {
    document.body.innerHTML = `
        <div style="
            display:flex; flex-direction:column; align-items:center;
            justify-content:center; min-height:100vh;
            color:white; font-family:'Segoe UI',sans-serif; text-align:center; padding:20px;
        ">
            <div style="font-size:70px; margin-bottom:20px;">🚫</div>
            <h1 style="font-size:28px; color:#ff4757; margin-bottom:15px;">
                Hi kid, don't bypass again!
            </h1>
            <p style="color:#a4b0be; margin-bottom:30px; font-size:15px;">
                You tried to skip the wait. Go through it properly.
            </p>
            <a href="index.html?id=${scriptId}" style="
                padding:15px 40px; background:linear-gradient(135deg,#667eea,#764ba2);
                color:white; text-decoration:none; border-radius:50px;
                font-size:17px; font-weight:600;
            ">⏳ Go Wait 15 Seconds</a>
        </div>
    `;
    throw new Error('bypass detected');
}

async function loadScript() {
    const container = document.getElementById('container');

    if (!scriptId) {
        container.innerHTML = `
            <div class="error">
                <h2>❌ No Script ID</h2>
                <p>Please use the link from Telegram bot</p>
            </div>
        `;
        return;
    }

    try {
        const response = await fetch('https://raw.githubusercontent.com/ZrozLOL/XenoScripts/main/scripts.json?t=' + Date.now());
        const data = await response.json();
        const script = data.scripts[scriptId];

        if (!script) {
            container.innerHTML = `
                <div class="error">
                    <h2>❌ Script Not Found</h2>
                    <p>This script doesn't exist or has been removed</p>
                </div>
            `;
            return;
        }

        const gameBadge = script.game === 'Universal'
            ? `<div class="game-badge">(Universal)</div>`
            : `<div class="game-badge">🎮 ${script.game}</div>`;
        
        const keyBadge = script.keyless
            ? `<div class="keyless-badge">Keyless 🔑🚫</div>`
            : `<div class="haskey-badge">Has key 🔑</div>`;
        
        const sideBadge = 
            script.script_side === 'server' 
            ? `<div class="server-badge">ServerSided 🖥️</div>`
            : script.script_side === 'both'
            ? `<div class="both-badge">Server & Client 🖥️💻</div>`
            : `<div class="client-badge">ClientSided 💻</div>`;
        

        container.innerHTML = `
            <h1>✅ ${script.name}</h1>

            <div class="script-info">
                <div class="badges">
                    ${gameBadge}
                    ${keyBadge}
                    ${sideBadge}
                </div>
                <p>${script.description}</p>
            </div>

            <div class="script-box" id="scriptCode">${script.code}</div>

            <div class="button-group">
                <button onclick="copyScript()">📋 Copy Script</button>
                <button class="btn-secondary" onclick="window.open('https://t.me/XenoScriptsSupported', '_blank')">📢 Join Channel</button>
            </div>

            <p class="copied-msg" id="copiedMsg">✓ Copied to clipboard!</p>
        `;

    } catch (error) {
        container.innerHTML = `
            <div class="error">
                <h2>❌ Error Loading Script</h2>
                <p>Please try again later or contact support</p>
            </div>
        `;
        console.error('Error:', error);
    }
}

function copyScript() {
    const scriptText = document.getElementById('scriptCode').innerText;
    navigator.clipboard.writeText(scriptText).then(() => {
        const msg = document.getElementById('copiedMsg');
        msg.style.display = 'block';
        setTimeout(() => { msg.style.display = 'none'; }, 2500);
    });
}

loadScript();
</script>
<script>
// Перевірка AdBlock при завантаженні сторінки
window.addEventListener('load', function() {
    setTimeout(function() {
        let adBlockDetected = false;
        
        // Метод 1: Перевірка через тестовий div
        const testAd = document.createElement('div');
        testAd.className = 'adsbox ad-banner';
        testAd.style.cssText = 'position:absolute;left:-9999px;width:1px;height:1px;';
        document.body.appendChild(testAd);
        
        if (testAd.offsetHeight === 0 || window.getComputedStyle(testAd).display === 'none') {
            adBlockDetected = true;
        }
        testAd.remove();
        
        // Метод 2: Перевірка чи рекламні скрипти завантажилися
        const adScripts = document.querySelectorAll('script[data-cfasync="false"]');
        if (adScripts.length > 0) {
            let anyLoaded = false;
            adScripts.forEach(function(script) {
                // Перевіряємо чи є window властивості від AdMaven
                if (window.addEventListener && !adBlockDetected) {
                    // Якщо скрипт завантажився, він створює глобальні змінні
                    anyLoaded = true;
                }
            });
        }
        
        // Показати попередження якщо виявлено AdBlock
        if (adBlockDetected) {
            document.body.innerHTML = `
                <div style="
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    justify-content: center;
                    min-height: 100vh;
                    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                    color: white;
                    font-family: 'Segoe UI', sans-serif;
                    text-align: center;
                    padding: 20px;
                ">
                    <div style="font-size: 80px; margin-bottom: 20px;">🚫</div>
                    <h1 style="font-size: 32px; margin-bottom: 15px;">
                        Please Disable AdBlock
                    </h1>
                    <p style="font-size: 16px; opacity: 0.9; margin-bottom: 30px; max-width: 400px;">
                        We detected that you're using an ad blocker. 
                        Please disable it and refresh the page to continue.
                    </p>
                    <button onclick="location.reload()" style="
                        padding: 18px 45px;
                        font-size: 18px;
                        background: white;
                        color: #667eea;
                        border: none;
                        border-radius: 50px;
                        cursor: pointer;
                        font-weight: 600;
                        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
                    ">
                        🔄 Refresh Page
                    </button>
                </div>
            `;
        }
    }, 1500);
});
</script>
