<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get Your Script - XenoScripts</title>

<script data-cfasync="false" src="//dcbbwymp1bhlf.cloudfront.net/?wbbcd=1253824"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: linear-gradient(135deg, #1a1a1a 0%, #000000 100%);
    color: white;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    overflow: hidden;
}

.script-container {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(10px);
    padding: 60px 40px;
    border-radius: 30px;
    max-width: 500px;
    width: 90%;
    box-shadow: 0 20px 60px rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.1);
    animation: fadeIn 0.6s ease-out;
    text-align: center;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
}

h1 {
    font-size: 32px;
    margin-bottom: 15px;
    font-weight: 600;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #ffffff 0%, #cccccc 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.script-info { margin-bottom: 20px; opacity: 0.9; }
.script-info p { margin: 5px 0; font-size: 15px; }

.badges {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin: 10px 0;
}

.game-badge {
    display: inline-block;
    background: rgba(255, 255, 255, 0.15);
    padding: 6px 18px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
}
.keyless-badge {
    display: inline-block;
    background: rgba(255, 255, 255, 0.2);
    padding: 6px 18px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
}
.haskey-badge {
    display: inline-block;
    background: rgba(200, 200, 200, 0.15);
    padding: 6px 18px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
}
.server-badge {
    display: inline-block;
    background: rgba(255, 255, 255, 0.1);
    padding: 6px 18px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
}
.client-badge {
    display: inline-block;
    background: rgba(180, 180, 180, 0.2);
    padding: 6px 18px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
}
.both-badge {
    display: inline-block;
    background: rgba(220, 220, 220, 0.15);
    padding: 6px 18px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
}

.script-box {
    background: rgba(0, 0, 0, 0.6);
    padding: 20px;
    border-radius: 20px;
    margin: 20px 0;
    font-family: 'Courier New', monospace;
    word-wrap: break-word;
    max-height: 300px;
    overflow-y: auto;
    border: 2px solid rgba(255, 255, 255, 0.1);
    font-size: 13px;
    line-height: 1.6;
    text-align: left;
}

.script-box::-webkit-scrollbar { width: 8px; }
.script-box::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); border-radius: 10px; }
.script-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 10px; }

.button-group {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 20px;
}

button {
    padding: 16px 35px;
    font-size: 17px;
    background: linear-gradient(135deg, #ffffff 0%, #cccccc 100%);
    border: none;
    color: #000000;
    cursor: pointer;
    border-radius: 50px;
    font-weight: 600;
    box-shadow: 0 10px 30px rgba(255, 255, 255, 0.2);
    transition: all 0.3s ease;
    letter-spacing: 0.5px;
}

button:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(255, 255, 255, 0.4); }
button:active { transform: translateY(-1px); }

.btn-secondary {
    background: linear-gradient(135deg, #cccccc 0%, #999999 100%);
    box-shadow: 0 10px 30px rgba(200, 200, 200, 0.2);
}
.btn-secondary:hover { box-shadow: 0 15px 40px rgba(200, 200, 200, 0.4); }

.copied-msg {
    color: #ffffff;
    font-weight: bold;
    text-align: center;
    margin-top: 15px;
    font-size: 17px;
    display: none;
    animation: bounceIn 0.5s ease-out;
}

@keyframes bounceIn {
    0% { opacity: 0; transform: scale(0.5); }
    100% { opacity: 1; transform: scale(1); }
}

.loading { text-align: center; font-size: 20px; padding: 30px; }
.error { text-align: center; color: #cccccc; padding: 20px; font-size: 17px; }

.particle {
    position: absolute;
    background: rgba(255, 255, 255, 0.8);
    border-radius: 50%;
    pointer-events: none;
}

@media (max-width: 600px) {
    .script-container { padding: 40px 25px; }
    h1 { font-size: 24px; }
    button { padding: 14px 28px; font-size: 15px; width: 100%; }
    .button-group { flex-direction: column; }
}
</style>
</head>
<body>

<div class="script-container" id="container">
    <div class="loading">⏳ Loading your script...</div>
</div>

<script>
function createParticles() {
    for (let i = 0; i < 60; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        const size = Math.random() * 6 + 3;
        particle.style.width = size + 'px';
        particle.style.height = size + 'px';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = '100%';
        const duration = Math.random() * 8 + 6;
        const delay = Math.random() * 10;
        const drift = Math.random() * 200 - 100;
        particle.style.animation = `float-${i} ${duration}s linear ${delay}s infinite`;
        
        const keyframes = `
            @keyframes float-${i} {
                0% { transform: translateY(0) translateX(0); opacity: 0; }
                10% { opacity: 0.8; }
                90% { opacity: 0.8; }
                100% { transform: translateY(-120vh) translateX(${drift}px); opacity: 0; }
            }
        `;
        const style = document.createElement('style');
        style.textContent = keyframes;
        document.head.appendChild(style);
        
        document.body.appendChild(particle);
    }
}

createParticles();

const urlParams = new URLSearchParams(window.location.search);
const scriptId = urlParams.get('id');

// Перевірка bypass — якщо не пройшов таймер
if (!sessionStorage.getItem('ad_passed_' + scriptId)) {
    document.body.innerHTML = `
        <div style="
            display:flex; flex-direction:column; align-items:center;
            justify-content:center; min-height:100vh;
            color:white; font-family:'Segoe UI',sans-serif; text-align:center; padding:20px;
        ">
            <div style="font-size:70px; margin-bottom:20px;">🚫</div>
            <h1 style="font-size:28px; color:#ffffff; margin-bottom:15px;">
                Hi kid, don't bypass again!
            </h1>
            <p style="color:#cccccc; margin-bottom:30px; font-size:15px;">
                You tried to skip the wait. Go through it properly.
            </p>
            <a href="index.html?id=${scriptId}" style="
                padding:15px 40px; background:linear-gradient(135deg,#ffffff,#cccccc);
                color:#000000; text-decoration:none; border-radius:50px;
                font-size:17px; font-weight:600;
            ">⏳ Go Wait 15 Seconds</a>
        </div>
    `;
    throw new Error('bypass detected');
}
function renderScriptLines(code) {
    const MAX_LINES = 6;
    const MAX_LINE_LEN = 60;
    const lines = code.split('\n');
    const visible = lines.slice(0, MAX_LINES);
    let html = visible.map(line => {
        const safe = line.replace(/</g, '&lt;').replace(/>/g, '&gt;');
        const trimmed = safe.length > MAX_LINE_LEN
            ? safe.slice(0, MAX_LINE_LEN) + '...'
            : safe;
        return `<div style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${trimmed}</div>`;
    }).join('');
    if (lines.length > MAX_LINES) {
        const remaining = lines.slice(MAX_LINES).join('\n').length;
        html += `<div style="color:rgba(255,255,255,0.5);font-style:italic;margin-top:6px;">(...${remaining} symbols more...)</div>`;
    }
    return html;
}
async function loadScript() {
    const container = document.getElementById('container');

    if (!scriptId) {
        container.innerHTML = `
            <div class="error">
                <h2>❌ No Script ID</h2>
                <p>Please use the link from Telegram bot</p>
            </div>
        `;
        return;
    }

    try {
        const response = await fetch('https://raw.githubusercontent.com/ZrozLOL/XenoScripts/main/scripts.json?t=' + Date.now());
        const data = await response.json();
        const script = data.scripts[scriptId];

        if (!script) {
            container.innerHTML = `
                <div class="error">
                    <h2>❌ Script Not Found</h2>
                    <p>This script doesn't exist or has been removed</p>
                </div>
            `;
            return;
        }

        const gameBadge = script.game === 'Universal'
            ? `<div class="game-badge">(Universal)</div>`
            : `<div class="game-badge">${script.game}</div>`;

        const keyBadge = script.keyless
            ? `<div class="keyless-badge">Keyless 🔑🚫</div>`
            : `<div class="haskey-badge">Has key 🔑</div>`;

        const sideBadge =
            script.script_side === 'server'
            ? `<div class="server-badge">ServerSided 🖥️</div>`
            : script.script_side === 'both'
            ? `<div class="both-badge">Server & Client 🖥️💻</div>`
            : `<div class="client-badge">ClientSided 💻</div>`;

        container.innerHTML = `
            <h1>${script.name}</h1>
            <div class="script-info">
                <div class="badges">
                    ${gameBadge}
                    ${keyBadge}
                    ${sideBadge}
                </div>
            </div>
            <div class="script-box" id="scriptCode">${renderScriptLines(script.code)}</div>
            <div class="button-group">
                <button onclick="copyScript()">📋 Copy Script</button>
                <button class="btn-secondary" onclick="window.open('https://t.me/XenoScriptsSupported', '_blank')">📢 Join Channel</button>
            </div>
            <p class="copied-msg" id="copiedMsg">✓ Copied to clipboard!</p>
        `;
        document.getElementById('scriptCode').dataset.raw = script.code;

    } catch (error) {
        container.innerHTML = `
            <div class="error">
                <h2>❌ Error Loading Script</h2>
                <p>Please try again later or contact support</p>
            </div>
        `;
        console.error('Error:', error);
    }
}

function copyScript() {
    // Зберігаємо оригінальний код у data-атрибуті при рендері
    const box = document.getElementById('scriptCode');
    const raw = box.dataset.raw;
    navigator.clipboard.writeText(raw).then(() => {
        const msg = document.getElementById('copiedMsg');
        msg.style.display = 'block';
        setTimeout(() => { msg.style.display = 'none'; }, 2500);
    });
}

loadScript();
</script>
