<script data-cfasync="false" src="//dcbbwymp1bhlf.cloudfront.net/?wbbcd=1253824"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.script-container {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    padding: 50px 40px;
    border-radius: 30px;
    max-width: 900px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(255, 255, 255, 0.2);
    animation: fadeIn 0.6s ease-out;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(-30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

h1 {
    font-size: 36px;
    margin-bottom: 15px;
    text-align: center;
    background: linear-gradient(135deg, #ffd89b 0%, #19547b 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.script-info {
    text-align: center;
    margin-bottom: 30px;
    opacity: 0.9;
}

.script-info p {
    margin: 5px 0;
    font-size: 16px;
}

.game-badge {
    display: inline-block;
    background: rgba(102, 126, 234, 0.3);
    padding: 8px 20px;
    border-radius: 20px;
    margin: 10px 0;
    font-size: 14px;
    font-weight: 600;
}

.script-box {
    background: rgba(0, 0, 0, 0.4);
    padding: 25px;
    border-radius: 20px;
    margin: 25px 0;
    font-family: 'Courier New', monospace;
    word-wrap: break-word;
    max-height: 400px;
    overflow-y: auto;
    border: 2px solid rgba(255, 255, 255, 0.1);
    font-size: 14px;
    line-height: 1.6;
}

.script-box::-webkit-scrollbar {
    width: 8px;
}

.script-box::-webkit-scrollbar-track {
    background: rgba(255, 255, 255, 0.1);
    border-radius: 10px;
}

.script-box::-webkit-scrollbar-thumb {
    background: rgba(102, 126, 234, 0.6);
    border-radius: 10px;
}

.button-group {
    display: flex;
    gap: 15px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 30px;
}

button {
    padding: 18px 45px;
    font-size: 18px;
    background: linear-gradient(135deg, #00d2ff 0%, #3a47d5 100%);
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 50px;
    font-weight: 600;
    box-shadow: 0 10px 30px rgba(0, 210, 255, 0.4);
    transition: all 0.3s ease;
}

button:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 40px rgba(0, 210, 255, 0.6);
}

button:active {
    transform: translateY(-1px);
}

.btn-secondary {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
}

.btn-secondary:hover {
    box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
}

.copied-msg {
    color: #00ff88;
    font-weight: bold;
    text-align: center;
    margin-top: 15px;
    font-size: 18px;
    display: none;
    animation: bounceIn 0.5s ease-out;
}

@keyframes bounceIn {
    0% {
        opacity: 0;
        transform: scale(0.5);
    }
    100% {
        opacity: 1;
        transform: scale(1);
    }
}

.loading {
    text-align: center;
    font-size: 20px;
    padding: 50px;
}

.error {
    text-align: center;
    color: #ff6b6b;
    padding: 30px;
    font-size: 18px;
}

@media (max-width: 600px) {
    .script-container {
        padding: 30px 20px;
    }
    
    h1 {
        font-size: 28px;
    }
    
    button {
        padding: 15px 30px;
        font-size: 16px;
        width: 100%;
    }
    
    .button-group {
        flex-direction: column;
    }
}

<body>

<div class="script-container" id="container">
    <div class="loading">⏳ Loading your script...</div>
</div>

<script>
// Перевірка чи пройшов юзер таймер
const urlParams = new URLSearchParams(window.location.search);
const scriptId = urlParams.get('id');

if (!sessionStorage.getItem('ad_passed_' + scriptId)) {
    // Не пройшов рекламу — кидаємо назад
    document.body.innerHTML = `
        <div style="
            display:flex; flex-direction:column; align-items:center;
            justify-content:center; min-height:100vh;
            background: transparent;
            color:white; font-family:'Segoe UI',sans-serif; text-align:center; padding:20px;
        ">
            <div style="font-size:80px; margin-bottom:20px;">🚫</div>
            <h1 style="font-size:32px; color:#ff4757; margin-bottom:15px;">
                Hi kid, don't bypass again!
            </h1>
            <p style="color:#a4b0be; margin-bottom:30px; font-size:16px;">
                You tried to skip the wait. Go through it properly.
            </p>
            <a href="index.html?id=${scriptId}" style="
                padding:15px 40px; background:linear-gradient(135deg,#667eea,#764ba2);
                color:white; text-decoration:none; border-radius:50px;
                font-size:18px; font-weight:600;
            ">⏳ Go Wait 15 Seconds</a>
        </div>
    `;
    throw new Error('bypass detected');
}
// Завантажуємо дані скрипта
async function loadScript() {
    const container = document.getElementById('container');
    
    if (!scriptId) {
        container.innerHTML = `
            <div class="error">
                <h2>❌ No Script ID</h2>
                <p>Please use the link from Telegram bot</p>
            </div>
        `;
        return;
    }
    
    try {
        // Завантажуємо scripts.json з GitHub
        const response = await fetch('https://raw.githubusercontent.com/ZrozLOL/XenoScripts/main/scripts.json?t=' + Date.now());
        const data = await response.json();
        
        // Знаходимо потрібний скрипт
        const script = data.scripts[scriptId];
        
        if (!script) {
            container.innerHTML = `
                <div class="error">
                    <h2>❌ Script Not Found</h2>
                    <p>This script doesn't exist or has been removed</p>
                </div>
            `;
            return;
        }
        
        // Відображаємо скрипт
        container.innerHTML = `
            <h1>✅ ${script.name}</h1>
            
            <div class="script-info">
                <div class="game-badge">🎮 ${script.game}</div>
                <p>${script.description}</p>
            </div>
            
            <div class="script-box" id="scriptCode">${script.code}</div>
            
            <div class="button-group">
                <button onclick="copyScript()">📋 Copy Script</button>
                <button class="btn-secondary" onclick="window.open('https://t.me/YOUR_CHANNEL', '_blank')">📢 Join Channel</button>
            </div>
            
            <p class="copied-msg" id="copiedMsg">✓ Copied to clipboard!</p>
        `;
        
    } catch (error) {
        container.innerHTML = `
            <div class="error">
                <h2>❌ Error Loading Script</h2>
                <p>Please try again later or contact support</p>
            </div>
        `;
        console.error('Error:', error);
    }
}

function copyScript() {
    const scriptText = document.getElementById('scriptCode').innerText;
    navigator.clipboard.writeText(scriptText).then(() => {
        const msg = document.getElementById('copiedMsg');
        msg.style.display = 'block';
        setTimeout(() => {
            msg.style.display = 'none';
        }, 2500);
    });
}

// Завантажуємо скрипт при відкритті сторінки
loadScript();
</script>

</body>
